<meta charset="utf-8">
<title>Ka-Yan’s Closet — SOWK6265 Qualitative Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --ground:#F7F5F1; --card:#FFFFFF; --ink:#14233F; --body:#3D4A5C; --mute:#7A8494;
  --teal:#1F8A8C; --teal-dk:#15686A; --teal-soft:#E3F0EF;
  --gold:#C9842B; --gold-dk:#96621E; --gold-soft:#F9EDDA;
  --purple:#6E5494; --purple-dk:#574377; --purple-soft:#EEE9F5;
  --brick:#B4552F; --brick-soft:#F7E6DE;
  --line:#E3DFD7; --shadow:0 2px 10px rgba(20,35,63,.07);
}
@media (prefers-color-scheme: dark){:root{
  --ground:#0F1826; --card:#1A2637; --ink:#EAF0F7; --body:#C3CEDC; --mute:#8593A6;
  --teal:#3AA9AB; --teal-dk:#5FC4C6; --teal-soft:#173238;
  --gold:#D99A45; --gold-dk:#E7B36B; --gold-soft:#33270F;
  --purple:#8E77B5; --purple-dk:#AB97CC; --purple-soft:#251E33;
  --brick:#D4764C; --brick-soft:#37200F;
  --line:#2A3850; --shadow:0 2px 10px rgba(0,0,0,.35);
}}
:root[data-theme="light"]{
  --ground:#F7F5F1; --card:#FFFFFF; --ink:#14233F; --body:#3D4A5C; --mute:#7A8494;
  --teal:#1F8A8C; --teal-dk:#15686A; --teal-soft:#E3F0EF;
  --gold:#C9842B; --gold-dk:#96621E; --gold-soft:#F9EDDA;
  --purple:#6E5494; --purple-dk:#574377; --purple-soft:#EEE9F5;
  --brick:#B4552F; --brick-soft:#F7E6DE;
  --line:#E3DFD7; --shadow:0 2px 10px rgba(20,35,63,.07);
}
:root[data-theme="dark"]{
  --ground:#0F1826; --card:#1A2637; --ink:#EAF0F7; --body:#C3CEDC; --mute:#8593A6;
  --teal:#3AA9AB; --teal-dk:#5FC4C6; --teal-soft:#173238;
  --gold:#D99A45; --gold-dk:#E7B36B; --gold-soft:#33270F;
  --purple:#8E77B5; --purple-dk:#AB97CC; --purple-soft:#251E33;
  --brick:#D4764C; --brick-soft:#37200F;
  --line:#2A3850; --shadow:0 2px 10px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--ground)}
body{font-family:"Avenir Next","Segoe UI",system-ui,-apple-system,sans-serif;color:var(--body);
  background:var(--ground);line-height:1.5;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font:inherit;color:var(--ink)}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
#topbar{position:sticky;top:0;z-index:90;background:var(--card);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;padding:10px 14px}
#topbar .crumb{font-size:13px;font-weight:700;color:var(--mute);letter-spacing:.5px;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .grow{flex:1}
.tbtn{font-size:13px;font-weight:700;color:var(--teal-dk);padding:7px 12px;border-radius:8px;background:var(--teal-soft)}
#wrap{max-width:780px;margin:0 auto;padding:18px 16px 60px}
.view{animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.kicker{font-size:12px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
h1{font-size:clamp(25px,6vw,36px);line-height:1.08;color:var(--ink);letter-spacing:-.5px;text-wrap:balance;margin-bottom:10px;font-weight:700}
h2{font-size:20px;color:var(--ink);margin-bottom:8px}
.lede{font-size:16px;margin-bottom:14px;max-width:62ch}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--teal);color:#fff;
  font-weight:700;font-size:16px;padding:13px 22px;border-radius:12px;min-height:48px}
.btn:active{transform:translateY(1px)}
.btn.gold{background:var(--gold)} .btn.purple{background:var(--purple)} .btn.brick{background:var(--brick)}
.btn.ghost{background:none;color:var(--teal-dk);border:2px solid var(--teal)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.navrow{display:flex;gap:10px;justify-content:space-between;margin-top:16px;flex-wrap:wrap}
.tip{border-left:4px solid var(--gold);background:var(--gold-soft);border-radius:8px;
  padding:10px 14px;font-size:14px;margin:12px 0;color:var(--ink)}
.tip b{color:var(--gold-dk)}
.mini{font-size:13px;color:var(--mute)}
input.txt{width:100%;background:var(--card);border:2px solid var(--line);border-radius:10px;
  padding:11px 13px;font-size:16px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.itile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center;position:relative}
.itile svg{width:100%;height:64px;display:block}
.itile .nm{font-size:10.5px;font-weight:600;color:var(--ink);line-height:1.2;margin-top:4px}
.itile.sel{border-color:var(--gold);background:var(--gold-soft);box-shadow:0 0 0 2px var(--gold)}
.minirow{display:flex;gap:4px;margin-top:6px}
.minirow button{flex:1;font-size:11.5px;font-weight:700;padding:6px 2px;border-radius:8px;min-height:32px}
.mk{background:var(--teal-soft);color:var(--teal-dk)}
.mt{background:var(--brick-soft);color:var(--brick)}
.itile .hit{display:block;width:100%}
.itile.exp{grid-column:1/-1;display:flex;gap:14px;align-items:center;text-align:left;padding:12px}
.itile.exp .hit{flex:0 0 72px}
.itile.exp .story{flex:1;font-family:Georgia,serif;font-style:italic;font-size:14px;color:var(--mute)}
.itile.exp .minirow{flex:0 0 190px;margin:0}
.unbtn{position:absolute;top:2px;left:4px;font-size:12px;opacity:.7}
#tabs{position:sticky;top:56px;z-index:30;background:var(--ground);display:flex;gap:8px;overflow-x:auto;
  padding:8px 2px;margin:0 -2px 10px;-webkit-overflow-scrolling:touch}
.tab{flex:none;border:2px solid var(--line);background:var(--card);border-radius:999px;
  padding:9px 16px;font-size:14px;font-weight:700;color:var(--ink);min-height:42px;white-space:nowrap}
.tab.on{background:var(--purple);border-color:var(--purple);color:#fff}
.tab.none{border-style:dashed}
.itile.inactive-home{opacity:.55}
.itile.active-home{border-color:var(--teal);background:var(--teal-soft);box-shadow:0 0 0 2px var(--teal)}
.homebadge{position:absolute;top:2px;left:4px;font-size:10px;background:var(--purple-soft);
  color:var(--purple-dk);border-radius:8px;padding:1px 6px;font-weight:700}
.shelf[role=button]{cursor:pointer}
.shelf[role=button]:hover{border-color:var(--teal)}
.bg{position:absolute;top:2px;right:5px;font-size:12px}
.bigcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
  padding:20px;text-align:center}
.bigcard svg{width:min(42vw,180px);height:auto;display:block;margin:0 auto}
.bigcard .nm{font-size:19px;font-weight:700;color:var(--ink);margin-top:8px}
.bigcard .st{font-family:Georgia,serif;font-style:italic;font-size:14.5px;color:var(--mute);margin-top:3px}
.twobtn{display:flex;gap:10px;margin-top:16px}
.twobtn .btn{flex:1}
.gchip{display:inline-flex;align-items:center;gap:7px;background:var(--purple-soft);color:var(--purple-dk);
  border-radius:999px;padding:9px 15px;font-size:15px;font-weight:700;margin:0 8px 8px 0;min-height:44px}
.exchip{display:inline-flex;background:var(--card);border:2px dashed var(--line);border-radius:999px;
  padding:8px 14px;font-size:14px;font-weight:600;color:var(--body);margin:0 8px 8px 0;min-height:42px}
.gbtn{display:block;width:100%;text-align:left;background:var(--card);border:2px solid var(--line);
  border-radius:12px;padding:12px 15px;margin-bottom:9px;font-size:15.5px;font-weight:600;color:var(--ink);min-height:48px}
.gbtn.on{border-color:var(--purple);background:var(--purple-soft)}
.gbtn.none{border-style:dashed;color:var(--mute)}
.gbtn .mini{font-weight:400}
.modal{position:fixed;inset:0;z-index:70;background:rgba(15,20,32,.55);display:flex;align-items:center;
  justify-content:center;padding:18px}
.modal .card{max-width:480px;width:100%;margin:0;max-height:86vh;overflow:auto}
.shelf{border:2px solid var(--purple);border-radius:12px;padding:12px;margin-bottom:12px;background:var(--card)}
.shelf h3{font-size:14px;color:var(--purple-dk);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.shelf .grid{grid-template-columns:repeat(auto-fill,minmax(76px,1fr))}
.shelf .itile{padding:5px 4px}.shelf .itile svg{height:48px}.shelf .itile .nm{font-size:9.5px}
#qrbox{background:#fff;border-radius:12px;padding:14px;display:inline-block}
.code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;background:var(--card);
  border:1px solid var(--line);border-radius:8px;padding:8px;word-break:break-all;max-height:90px;overflow:auto;color:var(--mute)}
.statrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.stat{flex:1;min-width:96px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px;text-align:center}
.stat .v{font-size:22px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.stat .k{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.6px}

"use strict";
var qrcodegen;
(function (qrcodegen) {
    /*---- QR Code symbol class ----*/
    /*
     * A QR Code symbol, which is a type of two-dimension barcode.
     * Invented by Denso Wave and described in the ISO/IEC 18004 standard.
     * Instances of this class represent an immutable square grid of dark and light cells.
     * The class provides static factory functions to create a QR Code from text or binary data.
     * The class covers the QR Code Model 2 specification, supporting all versions (sizes)
     * from 1 to 40, all 4 error correction levels, and 4 character encoding modes.
     *
     * Ways to create a QR Code object:
     * - High level: Take the payload data and call QrCode.encodeText() or QrCode.encodeBinary().
     * - Mid level: Custom-make the list of segments and call QrCode.encodeSegments().
     * - Low level: Custom-make the array of data codeword bytes (including
     *   segment headers and final padding, excluding error correction codewords),
     *   supply the appropriate version number, and call the QrCode() constructor.
     * (Note that all ways require supplying the desired error correction level.)
     */
    class QrCode {
        /*-- Constructor (low level) and fields --*/
        // Creates a new QR Code with the given version number,
        // error correction level, data codeword bytes, and mask number.
        // This is a low-level API that most users should not use directly.
        // A mid-level API is the encodeSegments() function.
        constructor(
        // The version number of this QR Code, which is between 1 and 40 (inclusive).
        // This determines the size of this barcode.
        version, 
        // The error correction level used in this QR Code.
        errorCorrectionLevel, dataCodewords, msk) {
            this.version = version;
            this.errorCorrectionLevel = errorCorrectionLevel;
            // The modules of this QR Code (false = light, true = dark).
            // Immutable after constructor finishes. Accessed through getModule().
            this.modules = [];
            // Indicates function modules that are not subjected to masking. Discarded when constructor finishes.
            this.isFunction = [];
            // Check scalar arguments
            if (version < QrCode.MIN_VERSION || version > QrCode.MAX_VERSION)
                throw new RangeError("Version value out of range");
            if (msk < -1 || msk > 7)
                throw new RangeError("Mask value out of range");
            this.size = version * 4 + 17;
            // Initialize both grids to be size*size arrays of Boolean false
            let row = [];
            for (let i = 0; i < this.size; i++)
                row.push(false);
            for (let i = 0; i < this.size; i++) {
                this.modules.push(row.slice()); // Initially all light
                this.isFunction.push(row.slice());
            }
            // Compute ECC, draw modules
            this.drawFunctionPatterns();
            const allCodewords = this.addEccAndInterleave(dataCodewords);
            this.drawCodewords(allCodewords);
            // Do masking
            if (msk == -1) { // Automatically choose best mask
                let minPenalty = 1000000000;
                for (let i = 0; i < 8; i++) {
                    this.applyMask(i);
                    this.drawFormatBits(i);
                    const penalty = this.getPenaltyScore();
                    if (penalty < minPenalty) {
                        msk = i;
                        minPenalty = penalty;
                    }
                    this.applyMask(i); // Undoes the mask due to XOR
                }
            }
            assert(0 <= msk && msk <= 7);
            this.mask = msk;
            this.applyMask(msk); // Apply the final choice of mask
            this.drawFormatBits(msk); // Overwrite old format bits
            this.isFunction = [];
        }
        /*-- Static factory functions (high level) --*/
        // Returns a QR Code representing the given Unicode text string at the given error correction level.
        // As a conservative upper bound, this function is guaranteed to succeed for strings that have 738 or fewer
        // Unicode code points (not UTF-16 code units) if the low error correction level is used. The smallest possible
        // QR Code version is automatically chosen for the output. The ECC level of the result may be higher than the
        // ecl argument if it can be done without increasing the version.
        static encodeText(text, ecl) {
            const segs = qrcodegen.QrSegment.makeSegments(text);
            return QrCode.encodeSegments(segs, ecl);
        }
        // Returns a QR Code representing the given binary data at the given error correction level.
        // This function always encodes using the binary segment mode, not any text mode. The maximum number of
        // bytes allowed is 2953. The smallest possible QR Code version is automatically chosen for the output.
        // The ECC level of the result may be higher than the ecl argument if it can be done without increasing the version.
        static encodeBinary(data, ecl) {
            const seg = qrcodegen.QrSegment.makeBytes(data);
            return QrCode.encodeSegments([seg], ecl);
        }
        /*-- Static factory functions (mid level) --*/
        // Returns a QR Code representing the given segments with the given encoding parameters.
        // The smallest possible QR Code version within the given range is automatically
        // chosen for the output. Iff boostEcl is true, then the ECC level of the result
        // may be higher than the ecl argument if it can be done without increasing the
        // version. The mask number is either between 0 to 7 (inclusive) to force that
        // mask, or -1 to automatically choose an appropriate mask (which may be slow).
        // This function allows the user to create a custom sequence of segments that switches
        // between modes (such as alphanumeric and byte) to encode text in less space.
        // This is a mid-level API; the high-level API is encodeText() and encodeBinary().
        static encodeSegments(segs, ecl, minVersion = 1, maxVersion = 40, mask = -1, boostEcl = true) {
            if (!(QrCode.MIN_VERSION <= minVersion && minVersion <= maxVersion && maxVersion <= QrCode.MAX_VERSION)
                || mask < -1 || mask > 7)
                throw new RangeError("Invalid value");
            // Find the minimal version number to use
            let version;
            let dataUsedBits;
            for (version = minVersion;; version++) {
                const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8; // Number of data bits available
                const usedBits = QrSegment.getTotalBits(segs, version);
                if (usedBits <= dataCapacityBits) {
                    dataUsedBits = usedBits;
                    break; // This version number is found to be suitable
                }
                if (version >= maxVersion) // All versions in the range could not fit the given data
                    throw new RangeError("Data too long");
            }
            // Increase the error correction level while the data still fits in the current version number
            for (const newEcl of [QrCode.Ecc.MEDIUM, QrCode.Ecc.QUARTILE, QrCode.Ecc.HIGH]) { // From low to high
                if (boostEcl && dataUsedBits <= QrCode.getNumDataCodewords(version, newEcl) * 8)
                    ecl = newEcl;
            }
            // Concatenate all segments to create the data bit string
            let bb = [];
            for (const seg of segs) {
                appendBits(seg.mode.modeBits, 4, bb);
                appendBits(seg.numChars, seg.mode.numCharCountBits(version), bb);
                for (const b of seg.getData())
                    bb.push(b);
            }
            assert(bb.length == dataUsedBits);
            // Add terminator and pad up to a byte if applicable
            const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
            assert(bb.length <= dataCapacityBits);
            appendBits(0, Math.min(4, dataCapacityBits - bb.length), bb);
            appendBits(0, (8 - bb.length % 8) % 8, bb);
            assert(bb.length % 8 == 0);
            // Pad with alternating bytes until data capacity is reached
            for (let padByte = 0xEC; bb.length < dataCapacityBits; padByte ^= 0xEC ^ 0x11)
                appendBits(padByte, 8, bb);
            // Pack bits into bytes in big endian
            let dataCodewords = [];
            while (dataCodewords.length * 8 < bb.length)
                dataCodewords.push(0);
            bb.forEach((b, i) => dataCodewords[i >>> 3] |= b << (7 - (i & 7)));
            // Create the QR Code object
            return new QrCode(version, ecl, dataCodewords, mask);
        }
        /*-- Accessor methods --*/
        // Returns the color of the module (pixel) at the given coordinates, which is false
        // for light or true for dark. The top left corner has the coordinates (x=0, y=0).
        // If the given coordinates are out of bounds, then false (light) is returned.
        getModule(x, y) {
            return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x];
        }
        /*-- Private helper methods for constructor: Drawing function modules --*/
        // Reads this object's version field, and draws and marks all function modules.
        drawFunctionPatterns() {
            // Draw horizontal and vertical timing patterns
            for (let i = 0; i < this.size; i++) {
                this.setFunctionModule(6, i, i % 2 == 0);
                this.setFunctionModule(i, 6, i % 2 == 0);
            }
            // Draw 3 finder patterns (all corners except bottom right; overwrites some timing modules)
            this.drawFinderPattern(3, 3);
            this.drawFinderPattern(this.size - 4, 3);
            this.drawFinderPattern(3, this.size - 4);
            // Draw numerous alignment patterns
            const alignPatPos = this.getAlignmentPatternPositions();
            const numAlign = alignPatPos.length;
            for (let i = 0; i < numAlign; i++) {
                for (let j = 0; j < numAlign; j++) {
                    // Don't draw on the three finder corners
                    if (!(i == 0 && j == 0 || i == 0 && j == numAlign - 1 || i == numAlign - 1 && j == 0))
                        this.drawAlignmentPattern(alignPatPos[i], alignPatPos[j]);
                }
            }
            // Draw configuration data
            this.drawFormatBits(0); // Dummy mask value; overwritten later in the constructor
            this.drawVersion();
        }
        // Draws two copies of the format bits (with its own error correction code)
        // based on the given mask and this object's error correction level field.
        drawFormatBits(mask) {
            // Calculate error correction code and pack bits
            const data = this.errorCorrectionLevel.formatBits << 3 | mask; // errCorrLvl is uint2, mask is uint3
            let rem = data;
            for (let i = 0; i < 10; i++)
                rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
            const bits = (data << 10 | rem) ^ 0x5412; // uint15
            assert(bits >>> 15 == 0);
            // Draw first copy
            for (let i = 0; i <= 5; i++)
                this.setFunctionModule(8, i, getBit(bits, i));
            this.setFunctionModule(8, 7, getBit(bits, 6));
            this.setFunctionModule(8, 8, getBit(bits, 7));
            this.setFunctionModule(7, 8, getBit(bits, 8));
            for (let i = 9; i < 15; i++)
                this.setFunctionModule(14 - i, 8, getBit(bits, i));
            // Draw second copy
            for (let i = 0; i < 8; i++)
                this.setFunctionModule(this.size - 1 - i, 8, getBit(bits, i));
            for (let i = 8; i < 15; i++)
                this.setFunctionModule(8, this.size - 15 + i, getBit(bits, i));
            this.setFunctionModule(8, this.size - 8, true); // Always dark
        }
        // Draws two copies of the version bits (with its own error correction code),
        // based on this object's version field, iff 7 <= version <= 40.
        drawVersion() {
            if (this.version < 7)
                return;
            // Calculate error correction code and pack bits
            let rem = this.version; // version is uint6, in the range [7, 40]
            for (let i = 0; i < 12; i++)
                rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
            const bits = this.version << 12 | rem; // uint18
            assert(bits >>> 18 == 0);
            // Draw two copies
            for (let i = 0; i < 18; i++) {
                const color = getBit(bits, i);
                const a = this.size - 11 + i % 3;
                const b = Math.floor(i / 3);
                this.setFunctionModule(a, b, color);
                this.setFunctionModule(b, a, color);
            }
        }
        // Draws a 9*9 finder pattern including the border separator,
        // with the center module at (x, y). Modules can be out of bounds.
        drawFinderPattern(x, y) {
            for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -4; dx <= 4; dx++) {
                    const dist = Math.max(Math.abs(dx), Math.abs(dy)); // Chebyshev/infinity norm
                    const xx = x + dx;
                    const yy = y + dy;
                    if (0 <= xx && xx < this.size && 0 <= yy && yy < this.size)
                        this.setFunctionModule(xx, yy, dist != 2 && dist != 4);
                }
            }
        }
        // Draws a 5*5 alignment pattern, with the center module
        // at (x, y). All modules must be in bounds.
        drawAlignmentPattern(x, y) {

const EXAMPLES=[
 {label:"🎨 By colour", cats:["Reds & pinks","Blues","Neutrals","Brights"]},
 {label:"💼 By occasion", cats:["Work","Casual","Special occasions","Sport & beach"]},
 {label:"☀️ By season", cats:["Summer","Winter","All-year"]},
 {label:"💭 By memories", cats:["Precious memories","No story","Complicated feelings"]},
 {label:"🔁 By how often", cats:["Weekly","Sometimes","Almost never"]}];

/* ============ state ============ */
let S=null;
try{ S=JSON.parse(localStorage.getItem("qcloset")||"null"); }catch(e){}
if(S && S.v!==4) S=null;
if(!S) S={v:4,name:"",teacher:false,phase:0,dec:{},groups:[],assign:{},parked:[],lateToss:[],refl:""};
function save(){ localStorage.setItem("qcloset",JSON.stringify(S)); }
let HIST=[];
try{ HIST=JSON.parse(localStorage.getItem("qcloset_hist")||"[]"); }catch(e){ HIST=[]; }
function snap(){ HIST.push(JSON.stringify(S)); if(HIST.length>250) HIST.shift();
  localStorage.setItem("qcloset_hist",JSON.stringify(HIST)); syncBack(); }
function undo(){
  document.querySelectorAll(".modal").forEach(x=>x.remove());
  if(!HIST.length) return;
  S=JSON.parse(HIST.pop()); S.tmp=null;
  localStorage.setItem("qcloset_hist",JSON.stringify(HIST)); save(); render(); }
function syncBack(){ const b=document.getElementById("backBtn");
  if(b){ b.disabled=!HIST.length; b.style.opacity=HIST.length?1:.4; } }
function esc(t){ return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
const wrap=document.getElementById("wrap");
function syncTeach(){}
document.getElementById("backBtn").onclick=()=>undo();
document.getElementById("resetBtn").onclick=()=>{
  document.querySelectorAll(".modal").forEach(x=>x.remove());
  const m=document.createElement("div"); m.className="modal";
  m.addEventListener("click",e=>{ if(e.target===m) m.remove(); });
  m.innerHTML='<div class="card"><h2>Start over?</h2>'+
  '<p style="font-size:14.5px;margin-bottom:12px">Your closet on this device will be erased.</p>'+
  '<div class="navrow" style="margin:0"><button class="btn ghost" data-test="restart-no">Cancel</button>'+
  '<button class="btn brick" data-test="restart-yes">Erase &amp; restart</button></div></div>';
  document.body.appendChild(m);
  m.querySelector("[data-test=restart-no]").onclick=()=>m.remove();
  m.querySelector("[data-test=restart-yes]").onclick=()=>{
    localStorage.removeItem("qcloset"); localStorage.removeItem("qcloset_hist");
    location.hash=""; location.reload(); };
};

function kept(){ return W.filter(it=>S.dec[it.id]==="keep" && !S.lateToss.includes(it.id)); }
function unassigned(){ return kept().filter(it=>!(it.id in S.assign) && !S.parked.includes(it.id)); }

/* ============ share encoding ============ */
function packState(){
  return { n:S.name||"", g:S.groups,
    a:S.groups.map((_,gi)=>kept().filter(it=>(S.assign[it.id]||[]).includes(gi)).map(it=>it.id)),
    p:S.parked.slice(), r:S.refl||"" };
}
function b64u(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function unb64u(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4)s+="="; return decodeURIComponent(escape(atob(s))); }
function shareCode(){ return b64u(JSON.stringify(packState())); }
function closetCode(){
  const s=JSON.stringify(packState()); let h=5381;
  for(let i=0;i<s.length;i++){ h=((h*33)^s.charCodeAt(i))>>>0; }
  const AB="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let out="";
  for(let i=0;i<6;i++){ out=AB[h%31]+out; h=Math.floor(h/31); }
  return out;
}
function shareURL(){ return location.origin+location.pathname+location.search+"#c="+shareCode(); }

/* ============ views ============ */
function render(){
  syncTeach(); syncBack();
  const names=["Welcome","The pile","Save or toss","Your groups","Sort it","Your closet","Present"];
  document.getElementById("crumb").textContent=CHAR+"’s Closet · "+names[S.phase];
  wrap.innerHTML=""; const el=document.createElement("div"); el.className="view";
  [welcome,pile,decide,groups,sortit,reveal,present][S.phase](el);
  wrap.appendChild(el); window.scrollTo({top:0});
}

function welcome(el){
  el.innerHTML='<p class="kicker">SOWK6265 · Qualitative Lab</p>'+
  '<h1>Help '+CHAR+' tidy her closet 🧥</h1>'+
  '<p class="lede">'+CHAR+' is moving flat, and her closet is chaos. <b>You</b> decide what she keeps, invent a system for it, and defend your choices. (Why are we doing this in a research methods class? You’ll see.)</p>'+
  '<div class="card"><p style="margin-bottom:8px;color:var(--ink)">And who’s helping her? (your name goes on your version of her closet)</p>'+
  '<input class="txt" id="nameIn" data-test="name" maxlength="24" placeholder="Your name or nickname" value="'+esc(S.name)+'">'+
  '<p class="mini">Everything stays on your device. At the end you get a framed closet + a QR to show YOUR take.</p></div>'+
  '<div class="card"><h2>Got a classmate’s closet code?</h2>'+
  '<input class="txt" id="peerIn" data-test="peer-code" placeholder="Paste their code here, press Enter"></div>'+
  '<div class="tip"><b>Hint:</b> there are no wrong answers ahead — only undefended ones. You’ll decide, group, and then explain <i>why</i>.</div>'+
  '<div class="navrow"><span></span><button class="btn" data-test="start">Open the closet →</button></div>';
  el.querySelector("#nameIn").oninput=e=>{ S.name=e.target.value; save(); };
  el.querySelector("#peerIn").onkeydown=e=>{
    if(e.key!=="Enter") return;
    const v=e.target.value.trim();
    try{ const st=JSON.parse(unb64u(v));
      if(st && Array.isArray(st.g) && Array.isArray(st.a)) viewer(st); else throw 0; }
    catch(err){ e.target.value=""; e.target.placeholder="That code didn’t work — check and paste again"; } };
  el.querySelector("[data-test=start]").onclick=()=>{ snap(); S.phase=1; save(); render(); };
}

function pile(el){
  el.innerHTML='<p class="kicker">Step 1 · everything out</p>'+
  '<h1>18 things. One closet. No system.</h1>'+
  '<p class="lede">Everything '+CHAR+' owns, out on the floor. This is your data: look at all of it — then start deciding.</p>'+
  '<div class="card"><div class="grid">'+W.map(it=>'<div class="itile">'+svgFor(it)+'<div class="nm">'+esc(it.n)+'</div></div>').join("")+'</div></div>'+
  '<div class="tip"><b>Hint:</b> look at everything before you touch anything — you can’t organise what you haven’t seen.</div>'+
  '<div class="navrow"><span></span><button class="btn gold" data-test="to-decide">Start sorting →</button></div>';
  el.querySelector("[data-test=to-decide]").onclick=()=>{ snap(); S.phase=2; save(); render(); };
}

let EXP=null;
function decide(el){
  const undecided=W.filter(it=>!(it.id in S.dec));
  const keeps=W.filter(it=>S.dec[it.id]==="keep");
  const tosses=W.filter(it=>S.dec[it.id]==="toss");
  el.innerHTML='<p class="kicker">Step 2 · save or toss · '+(W.length-undecided.length)+' of '+W.length+' decided</p>'+
  '<h1>Should she keep it?</h1>'+
  '<p class="lede">Tap 💚 or 🗑️ under each item. Not sure? Tap the picture to read its story. Change your mind any time with ↩.</p>'+
  '<div class="card" id="pool"><p class="mini" style="margin-bottom:8px">'+(undecided.length?'🧺 Still deciding · '+undecided.length:'🧺 All decided!')+'</p><div class="grid">'+
    undecided.map(it=>{
      const exp=EXP===it.id;
      return '<div class="itile'+(exp?" exp":"")+'">'+
        '<button class="hit" data-exp="'+it.id+'" aria-label="read story">'+svgFor(it)+(exp?"":'<div class="nm">'+esc(it.n)+'</div>')+'</button>'+
        (exp?'<div class="story"><b style="font-style:normal;color:var(--ink)">'+esc(it.n)+'</b><br>'+esc(it.st)+'</div>':"")+
        '<div class="minirow"><button class="mk" data-keep="'+it.id+'">💚 Keep</button><button class="mt" data-toss="'+it.id+'">🗑️ Toss</button></div>'+
      '</div>'; }).join("")+
  '</div></div>'+
  '<div class="shelf" style="border-color:var(--teal)"><h3 style="color:var(--teal-dk)">💚 Keeping ('+keeps.length+')</h3><div class="grid">'+
    keeps.map(it=>'<div class="itile"><button class="unbtn" data-undec="'+it.id+'" aria-label="undo">↩</button>'+svgFor(it)+'<div class="nm">'+esc(it.n)+'</div></div>').join("")+
  '</div></div>'+
  '<div class="shelf" style="border-color:var(--brick)"><h3 style="color:var(--brick)">🗑️ Letting go ('+tosses.length+')</h3><div class="grid">'+
    tosses.map(it=>'<div class="itile" style="opacity:.65"><button class="unbtn" data-undec="'+it.id+'" aria-label="undo">↩</button>'+svgFor(it)+'<div class="nm">'+esc(it.n)+'</div></div>').join("")+
  '</div></div>'+
  '<div class="tip"><b>Hint:</b> no wrong answers — but you must decide. Notice what you’re doing: judging what matters, and for whom.</div>'+
  '<div class="navrow"><span></span>'+
  (undecided.length===0?'<button class="btn" data-test="to-groups">Now invent your groups →</button>':'<span class="mini" style="align-self:center">'+undecided.length+' to go</span>')+'</div>';

  el.querySelectorAll("[data-exp]").forEach(b=>b.onclick=()=>{
    const id=+b.getAttribute("data-exp"); EXP=(EXP===id?null:id); render(); });
  el.querySelectorAll("[data-keep]").forEach(b=>b.onclick=()=>{
    snap(); S.dec[+b.getAttribute("data-keep")]="keep"; EXP=null; save(); render(); });
  el.querySelectorAll("[data-toss]").forEach(b=>b.onclick=()=>{
    const id=+b.getAttribute("data-toss");
    snap(); S.dec[id]="toss"; delete S.assign[id]; S.parked=S.parked.filter(x=>x!==id);
    EXP=null; save(); render(); });
  el.querySelectorAll("[data-undec]").forEach(b=>b.onclick=()=>{
    snap(); delete S.dec[+b.getAttribute("data-undec")]; save(); render(); });
  const nx=el.querySelector("[data-test=to-groups]");
  if(nx) nx.onclick=()=>{ snap(); EXP=null; SEL=null; S.phase=3; save(); render(); };
}

function groups(el){
  el.innerHTML='<p class="kicker">Step 3 · your system</p>'+
  '<h1>Invent your groups</h1>'+
  '<p class="lede">How will YOU organise what she’s keeping? By colour? Occasion? Season? By who gave it to her? '+
  '<b>There is no single inevitable set of categories</b> — but some systems are more coherent, useful, and defensible than others. Make groups you believe in and can defend. Pick 2–12.</p>'+
  '<div class="card"><h2>Your groups</h2><div id="gList">'+
  (S.groups.length?S.groups.map((g,i)=>'<span class="gchip">'+esc(g)+' <button data-gdel="'+i+'" aria-label="remove group">✕</button></span>').join(""):'<p class="mini" style="margin-bottom:8px">none yet — add at least 2</p>')+
  '</div>'+
  '<input class="txt" id="gIn" data-test="group-input" maxlength="28" placeholder="Type your own group name, press Enter">'+
  '<p class="mini" style="margin-bottom:6px">Or tap a ready-made system — it adds its categories (edit or delete them freely):</p>'+
  EXAMPLES.map((x,xi)=>'<button class="exchip" data-ex="'+xi+'"><b>'+x.label+'</b>&nbsp;→ '+x.cats.join(" · ")+'</button>').join("")+'</div>'+
  '<div class="tip"><b>Hint:</b> no two classmates will invent the same groups — by colour, by memory, by “the person she is when she wears it”… Different systems are expected. <b>Coherent beats clever</b>: clear meanings, little overlap, groups that could answer a question.</div>'+
  '<div class="navrow"><span></span><button class="btn" data-test="to-sort" '+(S.groups.length<2?"disabled":"")+'>Sort my things →</button></div>';
  const inp=el.querySelector("#gIn");
  function addg(name){ name=name.trim(); if(!name) return;
    if(S.groups.length>=12){ inp.value=""; inp.placeholder="Twelve is the max — merge or remove one first"; return; }
    if(S.groups.some(g=>g.toLowerCase()===name.toLowerCase())){ inp.value=""; return; }
    snap(); S.groups.push(name); save(); render(); }
  inp.onkeydown=e=>{ if(e.key==="Enter") addg(inp.value); };
  el.querySelectorAll("[data-ex]").forEach(b=>b.onclick=()=>{
    const set=EXAMPLES[+b.getAttribute("data-ex")]; snap();
    set.cats.forEach(c=>{ if(S.groups.length<12 && !S.groups.some(g=>g.toLowerCase()===c.toLowerCase())) S.groups.push(c); });
    save(); render(); });
  el.querySelectorAll("[data-gdel]").forEach(b=>b.onclick=()=>{
    const i=+b.getAttribute("data-gdel");
    const used=Object.values(S.assign).some(list=>list.includes(i));
    if(used){ b.closest(".gchip").insertAdjacentHTML("afterend",
      '<span class="mini" style="display:inline-block;margin:0 8px 8px 0;color:var(--brick)">↑ items live here — move them first</span>'); return; }
    snap(); S.groups.splice(i,1);
    Object.keys(S.assign).forEach(id=>{ S.assign[id]=S.assign[id].map(g=>g>i?g-1:g); });
    save(); render(); });
  el.querySelector("[data-test=to-sort]").onclick=()=>{ if(S.groups.length>=2){ snap(); S.phase=4; save(); render(); } };
}

let SEL=null;
function homes(id){ return S.assign[id]||[]; }
function sortit(el){
  if(typeof S.activeG!=="number") S.activeG=0;
  if(S.activeG>=S.groups.length) S.activeG=0;
  const items=kept();
  const unhomed=items.filter(it=>!homes(it.id).length && !S.parked.includes(it.id));
  const onLeft=S.activeG===-1;
  const placedN=items.length-unhomed.length;
  el.innerHTML='<p class="kicker">Step 4 · sort · '+placedN+' of '+items.length+' have a home</p>'+
  '<h1>Fill the shelves</h1>'+
  '<p class="lede">Pick a shelf below, then tap every item that belongs on it. Switch shelves and sweep again. Items left over at the end? The 🤷 tab sorts them out.</p>'+
  '<div id="tabs">'+
    S.groups.map((g,gi)=>{ const n=items.filter(it=>homes(it.id).includes(gi)).length;
      return '<button class="tab'+(S.activeG===gi?" on":"")+'" data-tab="'+gi+'">'+esc(g)+' · '+n+'</button>'; }).join("")+
    '<button class="tab none'+(onLeft?" on":"")+'" data-tab-none="1">🤷 No home · '+unhomed.length+'</button>'+
  '</div>'+
  (onLeft? leftoversView(unhomed) : sweepView(items, S.activeG))+
  '<div class="tip"><b>Hint:</b> fits two shelves, or fits none? Don’t rush past those moments — they’re the interesting ones. Remember what you chose; we’ll come back to it.</div>'+
  '<div class="navrow"><span class="mini" style="align-self:center">'+(unhomed.length?unhomed.length+' still need a home':'Everything has a home')+'</span>'+
  (unhomed.length===0?'<button class="btn purple" data-test="sort-done">See the closet →</button>':'<span></span>')+'</div>';

  el.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ S.activeG=+b.getAttribute("data-tab"); save(); render(); });
  const tn=el.querySelector("[data-tab-none]"); if(tn) tn.onclick=()=>{ S.activeG=-1; save(); render(); };

  if(!onLeft){
    const gi=S.activeG;
    el.querySelectorAll("[data-sort-item]").forEach(b=>b.onclick=()=>{
      const id=+b.getAttribute("data-sort-item"); const h=homes(id);
      if(S.parked.includes(id)){ snap(); S.parked=S.parked.filter(x=>x!==id); S.assign[id]=[gi]; save(); render(); return; }
      if(h.includes(gi)){ snap(); const rest=h.filter(x=>x!==gi);
        if(rest.length) S.assign[id]=rest; else delete S.assign[id];
        save(); render(); return; }
      if(h.length===0){ snap(); S.assign[id]=[gi]; save(); render(); return; }
      dilemmaMulti(id,gi);
    });
  } else {
    el.querySelectorAll("[data-lo-park]").forEach(b=>b.onclick=()=>{ const id=+b.getAttribute("data-lo-park");
      snap(); if(!S.parked.includes(id)) S.parked.push(id); save(); render(); });
    el.querySelectorAll("[data-lo-toss]").forEach(b=>b.onclick=()=>{ const id=+b.getAttribute("data-lo-toss");
      snap(); S.lateToss.push(id); delete S.assign[id]; S.parked=S.parked.filter(x=>x!==id); save(); render(); });
    el.querySelectorAll("[data-lo-new]").forEach(b=>b.onclick=()=>newGroupModal(+b.getAttribute("data-lo-new")));
    el.querySelectorAll("[data-unpark]").forEach(b=>b.onclick=()=>{ const id=+b.getAttribute("data-unpark");
      snap(); S.parked=S.parked.filter(x=>x!==id); save(); render(); });
  }
  const done=el.querySelector("[data-test=sort-done]");
  if(done) done.onclick=()=>{ snap(); S.phase=5; save(); render(); };
}

function sweepView(items, gi){
  return '<div class="card"><p class="mini" style="margin-bottom:8px">Tapping adds to <b style="color:var(--purple-dk)">'+esc(S.groups[gi])+'</b> · tap again to remove · items faded already live on another shelf</p><div class="grid">'+
    items.map(it=>{
      const h=homes(it.id); const inAct=h.includes(gi);
      const elsewhere=(h.length&&!inAct)||S.parked.includes(it.id);
      const cls=inAct?" active-home":(elsewhere?" inactive-home":"");
      const badge=inAct&&h.length>1?'<span class="bg">⧉</span>':
        (elsewhere?'<span class="homebadge">'+(S.parked.includes(it.id)?"🅿️":h.length>1?"⧉ "+h.length:esc(S.groups[h[0]].slice(0,10)))+'</span>':"");
      return '<button class="itile'+cls+'" data-sort-item="'+it.id+'">'+badge+svgFor(it)+'<div class="nm">'+esc(it.n)+(inAct?" ✓":"")+'</div></button>'; }).join("")+
  '</div></div>';
}

function leftoversView(unhomed){
  let html='<div class="card"><p class="mini" style="margin-bottom:8px">Nothing fits? These are often the most interesting things she owns. Decide for each:</p><div class="grid">'+
    (unhomed.length? unhomed.map(it=>'<div class="itile">'+svgFor(it)+'<div class="nm">'+esc(it.n)+'</div>'+
      '<div class="minirow"><button class="mk" data-lo-new="'+it.id+'">➕ New</button>'+
      '<button data-lo-park="'+it.id+'" style="background:var(--purple-soft);color:var(--purple-dk)">🅿️ Park</button>'+
      '<button class="mt" data-lo-toss="'+it.id+'">🗑️ Toss</button></div></div>').join("")
     :'<p class="mini">Nothing left over — nice.</p>')+
  '</div></div>';
  if(S.parked.length){
    html+='<div class="shelf" style="border-style:dashed"><h3>🅿️ Parked — doesn’t fit yet <span class="mini">(puzzling cases, kept in view)</span></h3><div class="grid">'+
      S.parked.map(id=>W[id]?'<div class="itile"><button class="unbtn" data-unpark="'+id+'" aria-label="unpark">↩</button>'+svgFor(W[id])+'<div class="nm">'+esc(W[id].n)+'</div></div>':"").join("")+'</div></div>'; }

function newGroupModal(id){
  const it=W[id];
  document.querySelectorAll(".modal").forEach(x=>x.remove());
  const m=document.createElement("div"); m.className="modal";
  m.addEventListener("click",e=>{ if(e.target===m) m.remove(); });
  m.innerHTML='<div class="card"><h2>Name the new group</h2>'+
  '<p style="font-size:14px;margin-bottom:10px">“'+esc(it.n)+'” will be its first resident.'+(S.groups.length>=12?" (Twelve groups is the max — merge or Park instead.)":"")+'</p>'+

  '<div class="navrow" style="margin:0"><button class="btn ghost" data-test="newgroup-cancel">Cancel</button>'+

    inp.onkeydown=e=>{ if(e.key==="Enter") create(); };
    m.querySelector("[data-test=newgroup-create]").onclick=create; }

}

function dilemmaMulti(id,gi){
  const it=W[id];
  const m=document.createElement("div"); m.className="modal";
  m.addEventListener("click",e=>{ if(e.target===m){ m.remove(); } });
  m.innerHTML='<div class="card"><h2>It fits more than one 🫣</h2>'+
  '<p style="font-size:14.5px;margin-bottom:10px">“'+esc(it.n)+'” already lives on <b>'+esc(S.groups[(S.assign[id]||[0])[0]])+'</b> — and you just tapped it for <b>'+esc(S.groups[gi])+'</b>. This happens whenever you sort anything that matters. Your call:</p>'+
  '<button class="gbtn" data-test="dm-both">⧉ Put it on <b>both</b> shelves<br><span class="mini">keep both meanings — honest, and common</span></button>'+
  '<button class="gbtn" data-test="dm-best">🎯 Move it — <b>'+esc(S.groups[gi])+'</b> is the better fit<br><span class="mini">forces you to argue which meaning is primary</span></button>'+
  '<button class="gbtn" data-test="dm-rethink">🛠️ My groups need <b>rethinking</b><br><span class="mini">maybe two groups are really one — go edit them</span></button></div>';
  document.body.appendChild(m);
  m.querySelector("[data-test=dm-both]").onclick=()=>{ snap(); S.assign[id]=[...(S.assign[id]||[]),gi]; save(); m.remove(); render(); };
  m.querySelector("[data-test=dm-best]").onclick=()=>{ snap(); S.assign[id]=[gi]; save(); m.remove(); render(); };
  m.querySelector("[data-test=dm-rethink]").onclick=()=>{ snap(); m.remove(); S.phase=3; save(); render(); };
}

function closetShelves(state){
  let html=state.g.map((g,gi)=>{
    const items=state.a[gi]||[];
    return '<div class="shelf"><h3>'+esc(g)+' <span class="mini">('+items.length+')</span></h3><div class="grid">'+
      (items.length?items.map(id=>{ const it=W[id]; if(!it) return "";
        const multi=state.a.filter(l=>l.includes(id)).length>1;
        return '<div class="itile">'+(multi?'<span class="bg">⧉</span>':"")+svgFor(it)+'<div class="nm">'+esc(it.n)+'</div></div>'; }).join("")
        :'<p class="mini">empty</p>')+
      '</div></div>'; }).join("");
  if(state.p && state.p.length){
    html+='<div class="shelf" style="border-style:dashed"><h3>🅿️ Parked — doesn’t fit yet</h3><div class="grid">'+
      state.p.map(id=>W[id]?'<div class="itile">'+svgFor(W[id])+'<div class="nm">'+esc(W[id].n)+'</div></div>':"").join("")+'</div></div>'; }
  return html;
}

function reveal(el){
  const st=packState();
  const multiN=kept().filter(it=>(S.assign[it.id]||[]).length>1).length;
  el.innerHTML='<p class="kicker">Step 5 · behold</p><h1>'+CHAR+'’s closet — your system</h1>'+
  '<div class="statrow">'+
  '<div class="stat"><div class="v">'+kept().length+'</div><div class="k">kept</div></div>'+
  '<div class="stat"><div class="v">'+(W.length-kept().length)+'</div><div class="k">let go</div></div>'+
  '<div class="stat"><div class="v">'+S.groups.length+'</div><div class="k">groups</div></div>'+
  '<div class="stat"><div class="v">'+multiN+'</div><div class="k">multi-coded</div></div>'+
  '<div class="stat"><div class="v">'+S.parked.length+'</div><div class="k">parked</div></div></div>'+
  closetShelves(st)+
  '<div class="card"><h2>Plot twist: that was qualitative analysis</h2>'+
  '<p style="font-size:15px;line-height:2;color:var(--ink)">✂️ Save / toss → deciding <b>analytic relevance and focus</b> — what matters for your question<br>'+
  '🗂️ Naming &amp; sorting the groups → <b>coding and categorisation</b><br>'+
  '⧉ Fits two groups → <b>multi-coding</b>, an everyday analytic judgement<br>'+
  '🅿️ Fits nothing → an <b>uncategorised, puzzling case</b> — and if it <i>contradicts</i> the pattern you’re building, it may become a <b>negative case</b><br>'+
  '🚪 This display → <b>representation</b>: order that others can see</p>'+
  '<p style="font-size:13px;color:var(--mute);margin-top:8px">One place the closet metaphor breaks: unlike tossing clothes, researchers <b>never throw raw data away</b>. The full dataset is kept — you decide which extracts are most relevant to the question.</p></div>'+
  '<div class="card"><h2>One line of reflection</h2>'+
  '<p class="mini" style="margin-bottom:8px">What do your groups say about how YOU read '+CHAR+'’s life? A classmate made totally different ones.</p>'+
  '<input class="txt" id="reflIn" data-test="reflection" maxlength="140" placeholder="My groups show that I…" value="'+esc(S.refl)+'"></div>'+
  '<div class="tip"><b>Hint:</b> compare with a neighbour — same closet, different systems. Different interpretations are possible, but <b>each must be supported and defensible</b>: do your groups have clear meanings? Do they overlap? What question could your closet answer?</div>'+
  '<div class="navrow"><button class="btn ghost" data-test="back-sort">← Re-sort</button><button class="btn purple" data-test="to-present">Present my closet →</button></div>';
  el.querySelector("#reflIn").oninput=e=>{ S.refl=e.target.value; save(); };
  el.querySelector("[data-test=back-sort]").onclick=()=>{ snap(); S.assign={}; S.parked=[]; S.phase=4; save(); render(); };
  el.querySelector("[data-test=to-present]").onclick=()=>{ snap(); S.phase=6; save(); render(); };
}

function present(el){
  const st=packState(); const url=shareURL();
  el.innerHTML='<p class="kicker">Step 6 · show &amp; tell</p>'+
  '<h1>'+esc(S.name||"My")+(S.name?"’s":"")+' take on '+CHAR+'’s closet</h1>'+
  '<p class="lede">Scan to open this exact closet on any phone — then let them interview you: <b>why these groups?</b></p>'+
  '<div class="card" style="text-align:center"><div id="qrbox"><canvas id="qrc" width="330" height="330"></canvas></div>'+
  '<p class="mini" style="margin-top:8px">If a scan doesn’t open the closet (some hosts drop the # part of links), copy the code below instead.</p>'+
  '<div class="navrow" style="margin:10px 0 0;justify-content:center;gap:10px">'+
  '<button class="btn" data-test="copy-link">Copy my closet link</button>'+
  '<button class="btn ghost" data-test="copy-code">Copy closet code</button></div>'+
  '<p class="mini" id="copyNote" style="margin-top:6px"></p></div>'+
  closetShelves(st)+
  (S.refl?'<div class="card"><p style="font-family:Georgia,serif;font-style:italic;color:var(--ink)">“'+esc(S.refl)+'”</p></div>':"")+
  '<div class="tip"><b>Hint:</b> scan a classmate’s QR (or swap codes) and interview each other: <i>“defend your groups.”</i> Then swap roles.</div>'+
  '<div class="navrow"><button class="btn ghost" data-test="back-reveal">← Back to my closet</button><span></span></div>';
  try{
    const qr=qrcodegen.QrCode.encodeText(url, qrcodegen.QrCode.Ecc.MEDIUM);
    const c=el.querySelector("#qrc"), ctx=c.getContext("2d"), n=qr.size;
    const scale=Math.max(2,Math.floor(330/(n+8))), pad=Math.floor((330-scale*n)/2);
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,330,330); ctx.fillStyle="#14233F";
    for(let y=0;y<n;y++)for(let x=0;x<n;x++) if(qr.getModule(x,y)) ctx.fillRect(pad+x*scale,pad+y*scale,scale,scale);
  }catch(e){ el.querySelector("#qrbox").innerHTML='<p class="mini" style="color:#333">QR unavailable — use the buttons below.</p>'; }
  el.querySelector("[data-test=copy-link]").onclick=async()=>{
    try{ await navigator.clipboard.writeText(url); note("Link copied — paste it anywhere."); }
    catch(e){ note("Copy blocked — long-press to select instead."); } };
  el.querySelector("[data-test=copy-code]").onclick=async()=>{
    try{ await navigator.clipboard.writeText(shareCode()); note("Code copied — a classmate can paste it on the welcome screen."); }
    catch(e){ note("Copy blocked — long-press to select instead."); } };
  function note(t){ el.querySelector("#copyNote").textContent=t; }
  el.querySelector("[data-test=back-reveal]").onclick=()=>{ snap(); S.phase=5; save(); render(); };
}

/* ============ viewer mode ============ */
function viewer(state){
  document.getElementById("crumb").textContent=(state.n||"A classmate")+"’s take on "+CHAR+"’s closet";
  wrap.innerHTML="";
  const el=document.createElement("div"); el.className="view";
  el.innerHTML='<p class="kicker">Shared closet</p>'+
  '<h1>'+esc(state.n||"A classmate")+(state.n?"’s":"")+' take on '+CHAR+'’s closet</h1>'+
  (state.r?'<div class="card"><p style="font-family:Georgia,serif;font-style:italic;color:var(--ink)">“'+esc(state.r)+'”</p></div>':"")+
  closetShelves(state)+
  '<p class="lede" style="margin-top:6px">Ask them: <b>why these groups?</b> Yours would look different — that’s the point.</p>'+
  '<div class="navrow"><span></span><button class="btn" data-test="make-own">Make my own closet →</button></div>';
  wrap.appendChild(el);
  el.querySelector("[data-test=make-own]").onclick=()=>{ history.replaceState(null,"",location.pathname+location.search); render(); };
}
function tryViewerFromHash(){
  const m=location.hash.match(/[#&]c=([A-Za-z0-9\-_]+)/);
  if(!m) return false;
  try{ const st=JSON.parse(unb64u(m[1]));
    if(st && Array.isArray(st.g) && Array.isArray(st.a)){ viewer(st); return true; } }catch(e){}
  return false;
}

if(!tryViewerFromHash()) render();
window.addEventListener("hashchange",()=>{ if(!tryViewerFromHash()) render(); });
</script>
